# =============================================================================
# Datastream Books — Deploy to PRI-Books-Dev
# =============================================================================
# Trigger:
#   - Push to main                   (auto-deploy from solo-dev workflow)
#   - Push to feature/* (future)     (in case branches are ever used)
#   - Manual via workflow_dispatch   (re-run a specific commit on demand)
#
# Auth: federated identity (OIDC) only. No client secret stored anywhere.
# The `datastream-books-cicd` Entra app reg has a federated credential
# matching this repo's main-branch token. See docs/runbooks/cicd-setup.md
# for the setup runbook.
#
# Required GitHub Secrets (set via Repo > Settings > Secrets > Actions):
#   AZURE_TENANT_ID                  Tenant GUID
#   AZURE_CLIENT_ID                  App registration (client) ID for the
#                                    datastream-books-cicd Entra app
#   AZURE_SUBSCRIPTION_ID            Subscription GUID (Azure Subscription PRI)
#   POWER_PLATFORM_ENVIRONMENT_URL   https://booksdev.crm.dynamics.com
#
# Optional GitHub Variables (non-secret config):
#   POWER_PLATFORM_SOLUTION_NAME     Override of "DatastreamBooks" solution name
#
# What the pipeline does:
#   1. Checkout
#   2. Set up .NET SDK 8, Node LTS, install pac CLI
#   3. Build the plugin assembly and run its tests
#   4. Pack solution/src into a managed solution zip (skipped if the
#      source folder is empty — first runs land here)
#   5. Authenticate to Azure via OIDC (azure/login@v2)
#   6. Authenticate pac to PRI-Books-Dev (federated identity is forwarded
#      via the Azure AD token obtained in step 5; see step body)
#   7. Import the solution to PRI-Books-Dev (skipped if no zip was packed)
#
# What the pipeline does NOT do:
#   - PRI-Books (production) is never a target of this workflow.
#   - SQL migrations against Azure SQL are wired in a later commit.
# =============================================================================

name: Deploy to PRI-Books-Dev

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (defaults to HEAD of triggering branch)'
        required: false
        default: ''

concurrency:
  # Serialize deploys to dev — solution imports are not safe in parallel.
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # required for OIDC token exchange with Entra

jobs:
  build-and-deploy:
    name: Build, test, and deploy to PRI-Books-Dev
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      SOLUTION_NAME: ${{ vars.POWER_PLATFORM_SOLUTION_NAME || 'DatastreamBooks' }}
      ENVIRONMENT_URL: ${{ secrets.POWER_PLATFORM_ENVIRONMENT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || github.sha }}

      - name: Set up .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Power Platform CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool
        shell: pwsh

      # -----------------------------------------------------------------
      # Build + test plugin assembly
      # -----------------------------------------------------------------
      - name: Restore plugin solution
        run: dotnet restore plugins/DatastreamBooks.Plugins/DatastreamBooks.Plugins.csproj
        shell: pwsh

      - name: Build plugin assembly
        run: dotnet build plugins/DatastreamBooks.Plugins/DatastreamBooks.Plugins.csproj -c Release --no-restore
        shell: pwsh

      - name: Restore plugin tests
        run: dotnet restore plugins/DatastreamBooks.Plugins.Tests/DatastreamBooks.Plugins.Tests.csproj
        shell: pwsh

      - name: Build plugin tests
        run: dotnet build plugins/DatastreamBooks.Plugins.Tests/DatastreamBooks.Plugins.Tests.csproj -c Release --no-restore
        shell: pwsh

      - name: Run plugin unit tests
        run: dotnet test plugins/DatastreamBooks.Plugins.Tests/DatastreamBooks.Plugins.Tests.csproj -c Release --no-build --logger "trx;LogFileName=plugin-tests.trx"
        shell: pwsh
        continue-on-error: false

      # -----------------------------------------------------------------
      # Authenticate via OIDC — no client secret involved
      # -----------------------------------------------------------------
      - name: Azure login (federated / OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # subscription-id is intentionally omitted. The datastream-books-cicd
          # SP has Dataverse permissions only (System Administrator on
          # PRI-Books-Dev via pac admin assign-user) and no Azure RBAC role
          # on the subscription. Passing subscription-id triggers
          # az account set, which requires RBAC; the SP can't see the
          # subscription and login fails. allow-no-subscriptions tells the
          # action to skip the set-subscription step entirely.
          #
          # When this workflow eventually needs Azure RBAC (e.g., to read
          # Key Vault for SQL passwords), grant the SP a least-privilege
          # role (e.g., Key Vault Secrets User on kv-datastream-books),
          # restore subscription-id here, and drop allow-no-subscriptions.
          allow-no-subscriptions: true

      # -----------------------------------------------------------------
      # Pack the solution (skipped gracefully if solution/src is empty)
      # -----------------------------------------------------------------
      - name: Detect packable solution
        id: detect_solution
        shell: pwsh
        run: |
          $entitiesDir = "solution/src/Entities"
          $hasEntities = (Test-Path $entitiesDir) -and ((Get-ChildItem -Path $entitiesDir -Directory -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0)
          if ($hasEntities) {
            "should_pack=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "solution/src/Entities has content - will pack."
          } else {
            "should_pack=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "solution/src/Entities is empty or missing - skipping pack/import (expected on first runs)."
          }
            
      - name: Pack solution (unmanaged)
        if: steps.detect_solution.outputs.should_pack == 'true'
        shell: pwsh
        run: |
          pac solution pack `
            --folder solution/src `
            --zipfile "$env:RUNNER_TEMP/$env:SOLUTION_NAME.zip" `
            --packagetype Unmanaged

      # -----------------------------------------------------------------
      # Authenticate pac to PRI-Books-Dev (federated identity)
      # -----------------------------------------------------------------
      # pac CLI's federated-identity support requires the OIDC token from
      # actions to be exchanged for an Entra token. azure/login@v2 already
      # logged us in; pac picks up the resulting AAD token via the
      # `pac auth create --deviceCode` substitution path is NOT what we want
      # here. The correct pattern is `pac auth create ... --applicationId
      # --tenant --federatedToken <token>`. The federated token is at
      # $env:ACTIONS_ID_TOKEN_REQUEST_TOKEN / .../URL — fetched here.

      - name: Authenticate pac to PRI-Books-Dev (GitHub federated identity)
        if: steps.detect_solution.outputs.should_pack == 'true'
        shell: pwsh
        run: |
            pac auth create `
              --name github-actions-dev `
              --environment "$env:ENVIRONMENT_URL" `
              --tenant "${{ secrets.AZURE_TENANT_ID }}" `
              --applicationId "${{ secrets.AZURE_CLIENT_ID }}" `
              --githubFederated

      - name: Import solution to PRI-Books-Dev
        if: steps.detect_solution.outputs.should_pack == 'true'
        shell: pwsh
        run: |
          pac solution import `
            --path "$env:RUNNER_TEMP/$env:SOLUTION_NAME.zip" `
            --force-overwrite `
            --publish-changes `
            --activate-plugins

      # -----------------------------------------------------------------
      # Future: SQL migrations against Azure SQL
      # -----------------------------------------------------------------
      # - name: Apply pending Azure SQL migrations
      #   if: steps.detect_solution.outputs.should_pack == 'true'
      #   run: pwsh ./scripts/run-sql-migration.ps1 -Environment dev
      #   env:
      #     # dsb_migrate connection string sourced via azure/login (Key Vault),
      #     # never stored in GitHub secrets long-term.

      - name: Upload plugin test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: warn
